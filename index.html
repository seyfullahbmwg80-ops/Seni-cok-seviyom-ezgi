<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beni seviyor musun?</title><style>
body{
margin:0;
font-family:sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ffdce6,#fff0f5,#f3e8ff);
overflow:hidden;
text-align:center;
}

h1{
font-size:40px;
text-shadow:0 0 15px white;
}

button{
padding:14px 28px;
margin:10px;
border:none;
border-radius:20px;
font-size:18px;
background:white;
box-shadow:0 0 15px rgba(255,0,80,.3);
cursor:pointer;
position:relative;
}

#message{
display:none;
font-size:24px;
margin-top:20px;
text-shadow:0 0 15px white;
}

.heart{
position:absolute;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-100px);opacity:1;}
100%{transform:translateY(100vh);opacity:0;}
}

.float{
position:absolute;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translate(0,0);}
50%{transform:translate(40px,-40px);}
}
</style></head><body><h1>beni seviyor musun?</h1><div>
<button onclick="love()">Evet 🤍</button>
<button id="noBtn">hayır</button>
</div><div id="message">
BENDE SENİ ÇOK SEVİYORUM EZGİMM🤍🫶🏻😻
</div><script>
const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("touchstart",move);
noBtn.addEventListener("mouseover",move);

function move(){
noBtn.style.position="absolute";
noBtn.style.left=Math.random()*80+"vw";
noBtn.style.top=Math.random()*80+"vh";
}

function love(){
document.getElementById("message").style.display="block";

for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML=i%2?"❤️":"🤍";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*2)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),5000);
}

for(let i=0;i<15;i++){
let heart=document.createElement("div");
heart.className="float";
heart.innerHTML=i%2?"❤️":"🤍";
heart.style.left=Math.random()*100+"vw";
heart.style.top=Math.random()*100+"vh";
document.body.appendChild(heart);
}
}
</script></body>
  </html>
